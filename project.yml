name: ESmanagers

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "11.0.0"

options:
  bundleIdPrefix: com.esmanagers
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

targets:
  ESmanagers:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources/ESmanagers
        createIntermediateGroups: true
        excludes:
          - Info.plist        # XcodeGen が生成する Info.plist をソースとして誤コンパイルしないよう除外
    info:
      path: Sources/ESmanagers/Info.plist
      properties:
        CFBundleDisplayName: ESmanagers
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSupportsIndirectInputEvents: YES
        NSFaceIDUsageDescription: "アプリ内の機密な就活データやパスワードを保護するためにFace IDを使用します。"
        GADApplicationIdentifier: "ca-app-pub-3940256099942544~1458002511"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: YES
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    settings:
      base:
        PRODUCT_NAME: ESmanagers
        PRODUCT_BUNDLE_IDENTIFIER: com.esmanagers.app
        SWIFT_VERSION: 5
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        ENABLE_PREVIEWS: YES
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
